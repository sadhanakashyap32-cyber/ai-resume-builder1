<script>
const supabaseUrl = "https://rtoknogjcogfehddfsnq.supabase.co";
const supabaseKey = "sb_publishable_mMtW6DjuXKa0EDk0qBWxJw_adTFaX9I";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById('resumeForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('name').value;
    const branch = document.getElementById('branch').value;
    const email = document.getElementById('email').value;
    const skills = document.getElementById('skills').value;
    const experience = document.getElementById('experience').value;

    // Insert into Supabase
    const { data, error } = await supabase.from('resumes').insert([
        { name, branch, email, skills, experience }
    ]);

    if (error) {
        alert("Error: " + error.message);
        return;
    }

    // Generate resume output
    const output = `
        <h2>${name}</h2>
        <p><strong>Branch:</strong> ${branch}</p>
        <p><strong>Email:</strong> ${email}</p>
        <p><strong>Skills:</strong> ${skills}</p>
        <p><strong>Experience:</strong> ${experience}</p>
    `;
    const resumeDiv = document.getElementById('resumeOutput');
    resumeDiv.innerHTML = output;
    resumeDiv.style.display = 'block';

    // Keep the resume displayed, do NOT reset resumeOutput
    // Optional: reset the form fields for new input
    document.getElementById('resumeForm').reset();
});
</script>
