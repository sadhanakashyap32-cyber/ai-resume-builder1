<form id="resumeForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    
    <!-- Resume fields -->
    <input type="text" id="education" placeholder="Education (e.g. BCA)" required>
    <input type="text" id="branch" placeholder="Branch / Major" required>
    <input type="text" id="skills" placeholder="Skills (comma separated)" required>
    <input type="text" id="projects" placeholder="Projects" required>
    
    <textarea id="message" placeholder="Additional Details / Summary" rows="5"></textarea>
    
    <button type="submit">Submit Resume</button>
</form>
