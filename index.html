<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Resume Builder</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

h1 {
    color: #4f46e5;
    margin-bottom: 20px;
}

form {
    display: flex;
    flex-direction: column;
    width: 400px;
    gap: 15px;
    background-color: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
}

input, textarea, button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    background-color: #4f46e5;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background-color: #3730a3;
}

#resumeOutput {
    margin-top: 20px;
    width: 400px;
    background-color: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
    display: none; /* hidden until generated */
}
</style>
</head>
<body>

<h1>AI Resume Builder</h1>

<form id="resumeForm">
    <input type="text" id="name" placeholder="Enter your name" required>
    <input type="text" id="branch" placeholder="Enter your branch" required>
    <input type="email" id="email" placeholder="Enter your Gmail" required>
    <input type="text" id="skills" placeholder="Enter your skills" required>
    <input type="text" id="experience" placeholder="Enter your experience" required>
    <button type="submit">Generate Resume</button>
</form>

<div id="resumeOutput"></div>

<script>
const supabaseUrl = "https://rtoknogjcogfehddfsnq.supabase.co";
const supabaseKey = "sb_publishable_mMtW6DjuXKa0EDk0qBWxJw_adTFaX9I";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById('resumeForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('name').value;
    const branch = document.getElementById('branch').value;
    const email = document.getElementById('email').value;
    const skills = document.getElementById('skills').value;
    const experience = document.getElementById('experience').value;

    // Insert into Supabase
    const { data, error } = await supabase.from('resumes').insert([
        { name, branch, email, skills, experience }
    ]);

    if (error) {
        alert("Error: " + error.message);
        return;
    }

    // Generate resume output
    const output = `
        <h2>${name}</h2>
        <p><strong>Branch:</strong> ${branch}</p>
        <p><strong>Email:</strong> ${email}</p>
        <p><strong>Skills:</strong> ${skills}</p>
        <p><strong>Experience:</strong> ${experience}</p>
    `;
    const resumeDiv = document.getElementById('resumeOutput');
    resumeDiv.innerHTML = output;
    resumeDiv.style.display = 'block';

    // Reset form
    document.getElementById('resumeForm').reset();
});
</script>

</body>
</html>
