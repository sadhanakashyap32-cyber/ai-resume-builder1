<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume Builder</title>

<link rel="stylesheet" href="style.css">

<!-- Supabase Library -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

<h1>AI Resume Builder</h1>

<button id="loginBtn">Login with Google</button>

<!-- Form -->
<form id="resumeForm">

<h2>Personal Info</h2>

<input type="text" placeholder="Full Name" id="name" required>
<input type="text" placeholder="Title/Profession" id="title" required>
<input type="email" placeholder="Email" id="email" required>
<input type="text" placeholder="Phone" id="phone" required>
<input type="text" placeholder="GitHub URL" id="github">

<h2>Profile Summary</h2>
<textarea placeholder="Write a short summary..." id="summary"></textarea>

<h2>Education</h2>
<textarea placeholder="Degree – College – Year" id="education"></textarea>

<h2>Skills</h2>
<textarea placeholder="Skills separated by commas" id="skills"></textarea>

<h2>Projects</h2>
<textarea placeholder="Project name – description" id="projects"></textarea>

<h2>Experience</h2>
<textarea placeholder="Company – Role – Duration" id="experience"></textarea>

<button type="button" onclick="generateResume()">Generate Resume</button>

</form>

</div>

<!-- Supabase Login Script -->
<script>

const supabaseUrl = "https://rtoknogjcogfehddfsnq.supabase.co"
const supabaseKey = "sb_publishable_mMtW6DjuXKa0EDk0qBWxJw_adTFaX9I"

const { createClient } = supabase
const supabaseClient = createClient(supabaseUrl, supabaseKey)

document.getElementById("loginBtn").addEventListener("click", async () => {

  await supabaseClient.auth.signInWithOAuth({
    provider: "google"
  })

})

</script>

</body>
</html>
