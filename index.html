<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Resume Builder</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f8f9fa;
    color: #333;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

form {
    display: flex;
    flex-direction: column;
    width: 350px;
    gap: 10px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

input, textarea, button {
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    background-color: #4f46e5;
    color: white;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #3730a3;
}

footer {
    margin-top: 20px;
    font-size: 14px;
    color: #666;
}
</style>
</head>
<body>

<h1>AI Resume Builder</h1>

<form id="resumeForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    <textarea id="message" placeholder="Message / Resume Details" rows="5"></textarea>
    <button type="submit">Submit Resume</button>
</form>

<footer>
    &copy; 2026 | Powered by <a href="https://vercel.com" target="_blank">Vercel</a>
</footer>

<script>
const supabaseUrl = "https://rtoknogjcogfehddfsnq.supabase.co";
const supabaseKey = "sb_publishable_mMtW6DjuXKa0EDk0qBWxJw_adTFaX9I";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById('resumeForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const message = document.getElementById('message').value;

    const { data, error } = await supabase.from('resumes').insert([
        { name, email, message }
    ]);

    if (error) {
        alert("Error: " + error.message);
    } else {
        alert("Resume submitted successfully!");
        document.getElementById('resumeForm').reset();
    }
});
</script>

</body>
</html>
